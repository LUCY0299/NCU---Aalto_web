<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — NCU × Aalto EMBA 後台管理</title>
  <meta name="description" content="NCU × Aalto EMBA 網站後台管理系統登入頁">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body class="login-page">

  <!-- 登入卡片 -->
  <div class="login-card">

    <!-- Logo 區 -->
    <div class="login-logo">
      <div class="logo-badge">
        <span>⚙️</span>
        <span>後台管理系統</span>
      </div>
      <h1>NCU × Aalto EMBA</h1>
      <p>國立中央大學 × 阿爾托大學 在職學位學程</p>
    </div>

    <!-- 登入表單 -->
    <form id="loginForm" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label for="username">帳號</label>
        <input type="text" id="username" name="username" placeholder="請輸入管理員帳號" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" name="password" placeholder="請輸入密碼" autocomplete="current-password"
          required>
      </div>

      <!-- 錯誤訊息（預設隱藏）-->
      <div id="errorMsg" class="alert alert-error">
        ❌ 帳號或密碼錯誤，請重新輸入
      </div>

      <!-- 登入按鈕 -->
      <button type="submit" class="btn btn-primary" id="loginBtn" style="margin-top:8px">
        <span id="btnText">登入後台</span>
        <span id="btnSpinner" class="loading-spinner" style="display:none"></span>
      </button>

    </form>

    <!-- 版本資訊 -->
    <!-- <p style="text-align:center; font-size:12px; color:#aaa; margin-top:24px">
      後台管理系統 v1.0 · API: <span id="apiUrl">http://localhost:8000</span>
    </p> -->

  </div>

  <script>
    const API_BASE = 'http://localhost:8000';

    // ─────────────────────────────────────────
    // 展示模式：設為 true 時不需後端即可瀏覽介面
    // 正式部署時改回 false
    // ─────────────────────────────────────────
    const DEMO_MODE = false;

    if (localStorage.getItem('admin_token')) {
      verifyExistingToken();
    }

    async function verifyExistingToken() {
      if (DEMO_MODE) { window.location.href = 'dashboard.html'; return; }
      const token = localStorage.getItem('admin_token');
      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          window.location.href = 'dashboard.html';
        } else {
          localStorage.removeItem('admin_token');
          localStorage.removeItem('admin_user');
        }
      } catch (e) {
        console.warn('無法連線到後端：', e.message);
      }
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim() || 'admin';
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btnText  = document.getElementById('btnText');
      const spinner  = document.getElementById('btnSpinner');
      const loginBtn = document.getElementById('loginBtn');

      errorMsg.classList.remove('show');
      btnText.textContent = '登入中...';
      spinner.style.display = 'inline-block';
      loginBtn.disabled = true;

      // 展示模式：任何帳密皆可登入
      if (DEMO_MODE) {
        await new Promise(r => setTimeout(r, 600)); // 模擬網路延遲
        localStorage.setItem('admin_token', 'demo-token');
        localStorage.setItem('admin_user', JSON.stringify({ username }));
        window.location.href = 'dashboard.html';
        return;
      }

      try {
        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        const response = await fetch(`${API_BASE}/api/v1/auth/login`, {
          method: 'POST',
          body: formData,
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('admin_token', data.access_token);
          const userRes = await fetch(`${API_BASE}/api/v1/auth/me`, {
            headers: { 'Authorization': `Bearer ${data.access_token}` }
          });
          if (userRes.ok) {
            const user = await userRes.json();
            localStorage.setItem('admin_user', JSON.stringify(user));
          }
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.classList.add('show');
        }
      } catch (error) {
        errorMsg.textContent = '⚠️ 無法連線到後端，請確認伺服器已啟動（localhost:8000）';
        errorMsg.classList.add('show');
      } finally {
        btnText.textContent = '登入後台';
        spinner.style.display = 'none';
        loginBtn.disabled = false;
      }
    }
  </script>
</body>

</html>
